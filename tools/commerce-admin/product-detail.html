<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="Description" content="Vitamix Commerce Admin – Product detail" />
    <meta name="robots" content="noindex" />
    <title>Vitamix Commerce Admin – Product</title>
    <link rel="stylesheet" href="commerce-auth.css" />
    <link rel="stylesheet" href="pim.css" />
    <link rel="stylesheet" href="commerce-admin-chrome.css" />
    <link rel="stylesheet" href="detail.css" />
  </head>
  <body class="commerce-admin-body" data-commerce-header="subpage" data-commerce-header-page="Product">
    <div id="commerce-admin-auth-root" aria-live="polite">
      <p class="commerce-admin-auth-placeholder">Checking sign-in…</p>
    </div>
    <header id="commerce-admin-app-header"></header>
    <main class="pim-main pim-detail-main">
      <div class="pim-detail-toolbar" id="toolbar" style="display: none;">
        <a href="catalog.html" class="pim-detail-back-link">← Back to products</a>
        <label class="pim-edit-toggle" for="editModeCheckbox">
          <span class="pim-edit-toggle-label">Edit mode</span>
          <span class="pim-edit-toggle-track">
            <input type="checkbox" id="editModeCheckbox" class="pim-edit-toggle-input" />
            <span class="pim-edit-toggle-thumb"></span>
          </span>
        </label>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading product…</p>
      </div>

      <div class="error" id="error"></div>

      <div class="pim-detail-content" id="content"></div>
    </main>
    <script type="module" src="auth-page-boot.js"></script>
    <script type="module" src="commerce-admin-header.js"></script>
    <script type="module" src="detail.js"></script>
  </body>
</html>
