<div class="support-search-root">
  <form class="support-search-form" method="get" action="#" role="search" aria-label="Support search">
    <label for="support-search-input" class="visually-hidden">Search</label>
    <input id="support-search-input" type="search" name="search" placeholder="Search" autocomplete="off" aria-label="Search">
    <button type="submit" class="button emphasis">Go</button>
  </form>
  <div class="support-search-type-filters" role="group" aria-label="Filter by type"></div>
  <div class="support-search-info">
    <p><span class="support-search-showing-label"></span> <span id="support-search-results-start">1</span>-<span id="support-search-results-end">12</span> <span class="support-search-of-label"></span> <span id="support-search-results-count">0</span></p>
  </div>
  <ul class="support-search-results"></ul>
  <nav class="support-search-pagination" aria-label="Pagination"></nav>
</div>
