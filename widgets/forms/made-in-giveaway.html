<form method="post" action="" aria-label="Made In Giveaway">
  <fieldset class="field radio-group">
    <legend data-required></legend>
    <div class="radio-options">
      <label class="radio-option">
        <input type="radio" name="own_vitamix" value="1" required aria-required="true">
        <span class="radio-label"></span>
      </label>
      <label class="radio-option">
        <input type="radio" name="own_vitamix" value="0">
        <span class="radio-label"></span>
      </label>
    </div>
  </fieldset>
  <div class="field">
    <label for="made-in-giveaway-email" data-required></label>
    <input id="made-in-giveaway-email" type="email" name="email" required aria-required="true" placeholder="" autocomplete="email">
  </div>
  <p class="button-wrapper">
    <button type="submit" class="button emphasis" data-leadsource="madein"></button>
  </p>
</form>
