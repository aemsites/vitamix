<form class="wellness-program-form" method="post" action="" aria-label="Wellness program">
  <div class="wellness-program-field">
    <label for="wellness-program-first-name">
      <span class="label-text"></span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="wellness-program-first-name" type="text" name="firstName" required aria-required="true" placeholder="" autocomplete="given-name">
  </div>
  <div class="wellness-program-field">
    <label for="wellness-program-last-name">
      <span class="label-text"></span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="wellness-program-last-name" type="text" name="lastName" required aria-required="true" placeholder="" autocomplete="family-name">
  </div>
  <div class="wellness-program-field">
    <label for="wellness-program-company-name">
      <span class="label-text"></span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="wellness-program-company-name" type="text" name="companyName" required aria-required="true" placeholder="" autocomplete="organization">
  </div>
  <div class="wellness-program-field">
    <label for="wellness-program-job-title">
      <span class="label-text"></span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="wellness-program-job-title" type="text" name="jobTitle" required aria-required="true" placeholder="" autocomplete="organization-title">
  </div>
  <div class="wellness-program-field">
    <label for="wellness-program-phone">
      <span class="label-text"></span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="wellness-program-phone" type="tel" name="phoneNumber" required aria-required="true" placeholder="" autocomplete="tel">
  </div>
  <div class="wellness-program-field">
    <label for="wellness-program-email">
      <span class="label-text"></span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="wellness-program-email" type="email" name="emailAddress" required aria-required="true" placeholder="" autocomplete="email">
  </div>
  <div class="wellness-program-field">
    <label for="wellness-program-remarks">
      <span class="label-text"></span>
    </label>
    <textarea id="wellness-program-remarks" name="otherRemarks" rows="5" placeholder=""></textarea>
  </div>
  <div class="wellness-program-actions">
    <button type="submit" class="button emphasis"></button>
  </div>
</form>
