<form class="contact-foundation-form" method="post" action="" aria-label="Contact foundation">
  <div class="contact-foundation-field">
    <label for="contact-foundation-first-name">
      <span class="label-text">First Name</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="contact-foundation-first-name" type="text" name="firstName" required aria-required="true" placeholder="" autocomplete="given-name">
  </div>
  <div class="contact-foundation-field">
    <label for="contact-foundation-last-name">
      <span class="label-text">Last Name</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="contact-foundation-last-name" type="text" name="lastName" required aria-required="true" placeholder="" autocomplete="family-name">
  </div>
  <div class="contact-foundation-field">
    <label for="contact-foundation-title">
      <span class="label-text">Title</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="contact-foundation-title" type="text" name="title" required aria-required="true" placeholder="" autocomplete="organization-title">
  </div>
  <div class="contact-foundation-field">
    <label for="contact-foundation-organization">
      <span class="label-text">Organization</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="contact-foundation-organization" type="text" name="organization" required aria-required="true" placeholder="" autocomplete="organization">
  </div>
  <div class="contact-foundation-field">
    <label for="contact-foundation-email">
      <span class="label-text">Email Address</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="contact-foundation-email" type="email" name="email" required aria-required="true" placeholder="" autocomplete="email">
  </div>
  <div class="contact-foundation-field">
    <label for="contact-foundation-focus-area">
      <span class="label-text">Focus Area</span><span class="required" aria-hidden="true">*</span>
    </label>
    <select id="contact-foundation-focus-area" name="focusArea" required aria-required="true">
      <option value="">Select an option</option>
    </select>
  </div>
  <div class="contact-foundation-field">
    <label for="contact-foundation-message">
      <span class="label-text">Message</span>
    </label>
    <textarea id="contact-foundation-message" name="message" rows="5" placeholder=""></textarea>
  </div>
  <div class="contact-foundation-actions">
    <button type="submit" class="button emphasis">SUBMIT</button>
  </div>
</form>
