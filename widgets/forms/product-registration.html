<form class="product-registration-form" method="post" action="" aria-label="Product registration">
  <fieldset class="product-registration-section">
    <legend class="product-registration-section-legend"><span class="section-legend-text">About your blender</span></legend>

    <div class="product-registration-field">
      <label for="product-registration-serial-number">
        <span class="label-text">Serial number</span><span class="required" aria-hidden="true">*</span>
      </label>
      <span id="product-registration-serial-number-hint" class="field-hint"></span>
      <input id="product-registration-serial-number" type="text" name="serialNumber" inputmode="numeric" pattern="[0-9]{18}" maxlength="18" placeholder="" autocomplete="off" required aria-required="true" aria-describedby="product-registration-serial-number-hint">
      <a href="#" class="product-registration-link find-serial-link" data-i18n="findSerialNumber">Find your serial number</a>
    </div>

    <div class="product-registration-field product-registration-radio-group">
      <span class="label-text radio-legend"></span>
      <div class="radio-options">
        <label class="radio-option">
          <input type="radio" name="planToUse" value="at-home" required aria-required="true">
          <span class="radio-label"></span>
        </label>
        <label class="radio-option">
          <input type="radio" name="planToUse" value="in-business">
          <span class="radio-label"></span>
        </label>
      </div>
    </div>

    <div class="product-registration-field">
      <label for="product-registration-purchased-from">
        <span class="label-text">Purchased from</span><span class="required" aria-hidden="true">*</span>
      </label>
      <select id="product-registration-purchased-from" name="purchasedFrom" required aria-required="true">
        <option value="">Select an option</option>
      </select>
    </div>

    <div class="product-registration-field">
      <label for="product-registration-purchased-on">
        <span class="label-text">Purchased on</span><span class="required" aria-hidden="true">*</span>
      </label>
      <div class="date-input-wrap">
        <input id="product-registration-purchased-on" type="date" name="purchasedOn" required aria-required="true">
      </div>
    </div>
  </fieldset>

  <fieldset class="product-registration-section">
    <legend class="product-registration-section-legend"><span class="section-legend-text">About you</span></legend>

    <div class="product-registration-field">
      <label for="product-registration-first-name">
        <span class="label-text">First Name</span><span class="required" aria-hidden="true">*</span>
      </label>
      <input id="product-registration-first-name" type="text" name="firstName" required aria-required="true" placeholder="" autocomplete="given-name">
    </div>
    <div class="product-registration-field">
      <label for="product-registration-last-name">
        <span class="label-text">Last Name</span><span class="required" aria-hidden="true">*</span>
      </label>
      <input id="product-registration-last-name" type="text" name="lastName" required aria-required="true" placeholder="" autocomplete="family-name">
    </div>
    <div class="product-registration-field">
      <label for="product-registration-address">
        <span class="label-text">Address</span><span class="required" aria-hidden="true">*</span>
      </label>
      <input id="product-registration-address" type="text" name="address" required aria-required="true" placeholder="" autocomplete="street-address">
    </div>
    <div class="product-registration-field">
      <label for="product-registration-address-line-2">
        <span class="label-text">Address Line 2</span>
      </label>
      <input id="product-registration-address-line-2" type="text" name="addressLine2" placeholder="" autocomplete="address-line2">
    </div>
    <div class="product-registration-field">
      <label for="product-registration-city">
        <span class="label-text">City</span><span class="required" aria-hidden="true">*</span>
      </label>
      <input id="product-registration-city" type="text" name="city" required aria-required="true" placeholder="" autocomplete="address-level2">
    </div>
    <div class="product-registration-field">
      <label for="product-registration-province">
        <span class="label-text">Province</span><span class="required" aria-hidden="true">*</span>
      </label>
      <select id="product-registration-province" name="province" required aria-required="true">
        <option value="">Choose your province</option>
      </select>
    </div>
    <div class="product-registration-field">
      <label for="product-registration-postal-code">
        <span class="label-text">Postal code</span><span class="required" aria-hidden="true">*</span>
      </label>
      <input id="product-registration-postal-code" type="text" name="postalCode" required aria-required="true" placeholder="" autocomplete="postal-code">
    </div>
    <div class="product-registration-field">
      <label for="product-registration-phone">
        <span class="label-text">Phone Number</span><span class="required" aria-hidden="true">*</span>
      </label>
      <input id="product-registration-phone" type="tel" name="phone" required aria-required="true" placeholder="" autocomplete="tel">
    </div>
    <div class="product-registration-field">
      <label for="product-registration-email">
        <span class="label-text">Email Address</span><span class="required" aria-hidden="true">*</span>
      </label>
      <input id="product-registration-email" type="email" name="email" required aria-required="true" placeholder="" autocomplete="email">
    </div>
  </fieldset>

  <div class="product-registration-consent">
    <div class="product-registration-field product-registration-checkbox">
      <label class="checkbox-label">
        <input type="checkbox" name="marketingOptIn" value="yes">
        <span class="checkbox-text"></span>
      </label>
    </div>
    <p class="product-registration-disclaimer email-consent-disclaimer"></p>
    <div class="product-registration-field product-registration-checkbox">
      <label class="checkbox-label terms-label">
        <input type="checkbox" name="acceptTerms" value="yes" required aria-required="true">
        <span class="checkbox-text terms-text"></span>
      </label>
    </div>
    <p class="product-registration-legal-links">
      <span class="click-here-prefix"></span>
      <a href="#" class="privacy-policy-link" data-i18n="privacyPolicy"></a>
      <span class="and-our"></span>
      <a href="#" class="terms-link" data-i18n="termsOfUse"></a>
    </p>
  </div>

  <div class="product-registration-actions">
    <button type="submit" class="button emphasis">Register</button>
    <button type="reset" class="button link-style clear-form-btn">Clear form</button>
  </div>
</form>
