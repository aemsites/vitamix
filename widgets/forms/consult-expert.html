<form class="consult-expert-form" method="post" action="" aria-label="Consult an expert">
  <div class="consult-expert-field">
    <label for="consult-expert-first-name">
      <span class="label-text">First Name</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="consult-expert-first-name" type="text" name="firstName" required aria-required="true" placeholder="" autocomplete="given-name">
  </div>
  <div class="consult-expert-field">
    <label for="consult-expert-last-name">
      <span class="label-text">Last Name</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="consult-expert-last-name" type="text" name="lastName" required aria-required="true" placeholder="" autocomplete="family-name">
  </div>
  <div class="consult-expert-field">
    <label for="consult-expert-business-name">
      <span class="label-text">Business Name</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="consult-expert-business-name" type="text" name="businessName" required aria-required="true" placeholder="" autocomplete="organization">
  </div>
  <div class="consult-expert-field">
    <label for="consult-expert-address-line-1">
      <span class="label-text">Business Address Line 1</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="consult-expert-address-line-1" type="text" name="businessAddressLine1" required aria-required="true" placeholder="" autocomplete="address-line1">
  </div>
  <div class="consult-expert-field">
    <label for="consult-expert-address-line-2">
      <span class="label-text">Business Address Line 2 (Optional)</span>
    </label>
    <input id="consult-expert-address-line-2" type="text" name="businessAddressLine2" placeholder="" autocomplete="address-line2">
  </div>
  <div class="consult-expert-field">
    <label for="consult-expert-city">
      <span class="label-text">City</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="consult-expert-city" type="text" name="city" required aria-required="true" placeholder="" autocomplete="address-level2">
  </div>
  <div class="consult-expert-field">
    <label for="consult-expert-state">
      <span class="label-text">State</span><span class="required" aria-hidden="true">*</span>
    </label>
    <select id="consult-expert-state" name="state" required aria-required="true">
      <option value="">Please Select</option>
    </select>
  </div>
  <div class="consult-expert-field">
    <label for="consult-expert-zip">
      <span class="label-text">Zip Code</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="consult-expert-zip" type="text" name="zipCode" required aria-required="true" placeholder="" autocomplete="postal-code" inputmode="numeric">
  </div>
  <div class="consult-expert-field consult-expert-country-field">
    <span class="label-text">Country</span>
    <div class="consult-expert-country-value">
      <span class="country-display">United States</span>
      <input type="hidden" name="country" value="United States">
      <a href="#" class="country-change-link">Not your country?</a>
    </div>
  </div>
  <div class="consult-expert-field">
    <label for="consult-expert-email">
      <span class="label-text">Email Address</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="consult-expert-email" type="email" name="emailAddress" required aria-required="true" placeholder="" autocomplete="email">
  </div>
  <div class="consult-expert-field">
    <label for="consult-expert-phone">
      <span class="label-text">Phone Number</span><span class="required" aria-hidden="true">*</span>
    </label>
    <input id="consult-expert-phone" type="tel" name="phoneNumber" required aria-required="true" placeholder="" autocomplete="tel">
  </div>
  <div class="consult-expert-field">
    <label for="consult-expert-type-of-business">
      <span class="label-text">Type Of Business</span><span class="required" aria-hidden="true">*</span>
    </label>
    <select id="consult-expert-type-of-business" name="typeOfBusiness" required aria-required="true">
      <option value="">Select an option</option>
    </select>
  </div>
  <div class="consult-expert-field">
    <label for="consult-expert-number-of-locations">
      <span class="label-text">Number Of Locations</span><span class="required" aria-hidden="true">*</span>
    </label>
    <select id="consult-expert-number-of-locations" name="numberOfLocations" required aria-required="true">
      <option value="">Select an option</option>
    </select>
  </div>
  <div class="consult-expert-field">
    <label for="consult-expert-how-may-we-help">
      <span class="label-text">How may we help you? (optional)</span>
    </label>
    <textarea id="consult-expert-how-may-we-help" name="howMayWeHelp" rows="5" placeholder=""></textarea>
  </div>
  <div class="consult-expert-actions">
    <button type="submit" class="button emphasis">Submit</button>
  </div>
</form>
