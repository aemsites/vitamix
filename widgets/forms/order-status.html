<form class="order-status-form" method="post" action="" aria-label="Order status lookup">
  <div class="order-status-field">
    <label for="order-status-order-number">
      <span class="label-text">Order Number</span>
    </label>
    <input id="order-status-order-number" type="text" name="orderNumber" placeholder="" autocomplete="off" required
      aria-required="true">
  </div>
  <div class="order-status-actions">
    <button type="submit" class="button emphasis">Search Order</button>
  </div>
</form>
<div class="order-status-result" aria-live="polite" hidden></div>
