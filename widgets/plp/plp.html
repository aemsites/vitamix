<div class="plp-widget">
  <section class="plp-lifestyle" aria-label="Shop by lifestyle">
    <div class="plp-lifestyle-header">
      <h2 class="plp-lifestyle-heading"></h2>
      <a class="plp-lifestyle-recommender" href="#"></a>
    </div>
    <div class="plp-lifestyle-carousel">
      <ul>
        <li class="plp-lifestyle-card" data-filter-collection="Ascent Series">
          <picture>
            <img src="/placeholders/media_6031ca041555ef5cb297738891a7a259abd3bd5e.png" alt="" loading="lazy" width="280" height="360">
          </picture>
          <div class="plp-lifestyle-overlay">
            <p class="plp-lifestyle-title">Ascent X</p>
            <p class="plp-lifestyle-desc">Clarity, Compatibility</p>
          </div>
        </li>
        <li class="plp-lifestyle-card" data-filter-collection="Propel Series">
          <picture>
            <img src="/placeholders/media_6031ca041555ef5cb297738891a7a259abd3bd5e.png" alt="" loading="lazy" width="280" height="360">
          </picture>
          <div class="plp-lifestyle-overlay">
            <p class="plp-lifestyle-title">Propel</p>
            <p class="plp-lifestyle-desc">Powerful, Compact</p>
          </div>
        </li>
        <li class="plp-lifestyle-card" data-filter-product-type="Food Processing">
          <picture>
            <img src="/placeholders/media_6031ca041555ef5cb297738891a7a259abd3bd5e.png" alt="" loading="lazy" width="280" height="360">
          </picture>
          <div class="plp-lifestyle-overlay">
            <p class="plp-lifestyle-title">Food Processing</p>
            <p class="plp-lifestyle-desc">Chop, Slice, Shred</p>
          </div>
        </li>
        <li class="plp-lifestyle-card" data-filter-collection="Kitchen Systems &amp; Bundles">
          <picture>
            <img src="/placeholders/media_6031ca041555ef5cb297738891a7a259abd3bd5e.png" alt="" loading="lazy" width="280" height="360">
          </picture>
          <div class="plp-lifestyle-overlay">
            <p class="plp-lifestyle-title">Kitchen Systems</p>
            <p class="plp-lifestyle-desc">Complete Solutions</p>
          </div>
        </li>
      </ul>
    </div>
  </section>

  <div class="plp-toolbar">
    <button type="button" class="plp-filters-trigger secondary">
      <span class="plp-filters-trigger-label"></span>
      <span class="plp-filters-count"></span>
    </button>
    <div class="plp-filter-dropdowns" aria-label="Product filters"></div>
    <p class="plp-item-count" aria-live="polite">
      <span id="plp-widget-results-count">0</span>
      <span class="plp-item-count-label"></span>
    </p>
    <details class="plp-sort">
      <summary><span class="plp-sort-label"></span> <span id="plp-widget-sortby" data-sort="featured"></span></summary>
      <menu>
        <li><button type="button" data-sort="featured"></button></li>
        <li><button type="button" data-sort="price-desc"></button></li>
        <li><button type="button" data-sort="price-asc"></button></li>
        <li><button type="button" data-sort="name"></button></li>
      </menu>
    </details>
  </div>

  <div class="plp-active-filters" hidden>
    <button type="button" class="plp-clear-all"></button>
    <div class="plp-filter-tags"></div>
  </div>

  <aside class="plp-facet-drawer" aria-hidden="true" aria-label="Filters">
    <div class="plp-facet-drawer-panel">
      <div class="plp-facet-drawer-header">
        <h2 class="plp-facet-drawer-title"></h2>
        <button type="button" class="plp-facet-drawer-close" aria-label="Close filters"></button>
      </div>
      <div class="plp-facet-drawer-selected"></div>
      <div class="plp-facet-drawer-list"></div>
      <div class="plp-facet-drawer-actions">
        <button type="button" class="plp-facet-drawer-cancel secondary"></button>
        <button type="button" class="plp-facet-drawer-apply"></button>
      </div>
    </div>
  </aside>

  <p class="plp-empty" hidden></p>
  <div class="plp-results" role="list"></div>
</div>
