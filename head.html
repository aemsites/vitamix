<script>
  (function () {
    try {
      if (new URLSearchParams(location.search).get('martech') === 'off') return;
      if (!location.pathname.startsWith('/us/en_us/')) return;
      if (!/(?:^|;\s*)CookieConsent=[^;]*marketing(?::|%3A)true/.test(document.cookie)) return;
      var s = document.createElement('style');
      s.id = 'at-body-style';
      s.innerHTML = 'body { opacity: 0 !important }';
      document.head.appendChild(s);
      setTimeout(function () {
        var el = document.getElementById('at-body-style');
        if (el) el.remove();
      }, 1800);
    } catch (e) { /* fail open */ }
  })();
</script>
